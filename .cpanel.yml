---
deployment:
  tasks:
    - export DEPLOYPATH=/home/theeiorh/public_html/
    - /bin/cp -R *.html *.css *.js *.csv *.json .htaccess $DEPLOYPATH
    - /bin/cp index about research research-series profiles community contributors dataset explorer today-in-history $DEPLOYPATH
    - /bin/mkdir -p ${DEPLOYPATH}data; /bin/cp data/history.json data/international-days.json ${DEPLOYPATH}data/ 2>/dev/null; true
    - /bin/cp -R empire $DEPLOYPATH
    - /bin/cp -R logos $DEPLOYPATH
    - /bin/rm -f ${DEPLOYPATH}index.html ${DEPLOYPATH}about.html ${DEPLOYPATH}research.html ${DEPLOYPATH}research-series.html ${DEPLOYPATH}profiles.html ${DEPLOYPATH}community.html ${DEPLOYPATH}contributors.html ${DEPLOYPATH}dataset.html ${DEPLOYPATH}explorer.html
    - /bin/rm -f ${DEPLOYPATH}empire/*.html
